version: '3.8'

# Uso local para desenvolvimento e teste
# Para produção, suba cada serviço no Railway separadamente

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Auth básico — troque em produção
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-troqueisso123}
      # Variáveis usadas pelos workflows
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - growth-net

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_PUBLIC_URL:-http://localhost:8080}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # Banco — usa Supabase como storage
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${SUPABASE_DB_PASSWORD}@${SUPABASE_DB_HOST}:5432/postgres
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      # Webhook global → n8n
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_URL:-http://localhost:5678}/webhook/evolution-webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      # QR code via websocket
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#000000
      # Limites anti-ban
      - INSTANCE_EXPIRATION_TIME=0
      - DEL_INSTANCE=false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - growth-net

  wallet-service:
    build:
      context: ../apps/wallet-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SERVICE_URL=${SERVICE_URL:-http://localhost:3001}
      - APPLE_CERT_PASSPHRASE=${APPLE_CERT_PASSPHRASE}
    volumes:
      - ../apps/wallet-service/certs:/app/certs:ro
      - ../apps/wallet-service/passmodel:/app/passmodel:ro
    networks:
      - growth-net

volumes:
  n8n_data:
  evolution_data:

networks:
  growth-net:
    driver: bridge
